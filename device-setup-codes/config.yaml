name: "Device Setup Codes"
description: "Store and manage HomeKit, Matter, Ring, and Homematic setup codes"
version: "1.1.0"
slug: "device-setup-codes"
init: false
arch:
  - amd64
  - aarch64
  - armv7
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "Web UI"
map:
  - config:rw
hassio_api: true
